spring:
  application:
    name: helpdesk-bff
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      allow-override: true
      override-none: true
      fail-fast: false
  output:
    ansi:
      enabled: ALWAYS
  repository:
    include: false

