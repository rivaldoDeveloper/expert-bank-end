springdoc:
  openapi:
    title: "Help Desk BFF API"
    description: "Gateway de Microsserviços do Help Desk"
    version: "1.0.0"

eureka:
  client:
    service-url:
      fetch-registry: true
      register-with-eureka: true
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}