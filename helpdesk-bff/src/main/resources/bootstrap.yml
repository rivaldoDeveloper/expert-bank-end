spring:
  application:
    name: helpdesk-bff
  cloud:
    config:
      uri: 'config-server'
      allow-override: true
      override-none: true
  output:
    ansi:
      enabled: ALWAYS
  repository:
    include: false
eureka:
  client:
    service-url:
      fetch-registry: true
      register-with-eureka: true
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
