spring:
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: auth-service-api
  cloud:
    config:
      name: auth-service-api
      uri: ${CONFIG_SERVER_URI}
      fail-fast: true
      override-none: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        max-attempts: 6
  profiles:
    active: ${PROFILE_ACTIVE}
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URI}